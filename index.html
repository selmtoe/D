<html lang="ja">

    <style>

            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: radial-gradient(circle at center, #00695c 0%, #004d40 100%);
            color: #E0E0E0;
            margin: 0;
padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            /* overflow: hidden;
            を削除してスクロールを有効化 */
            transition: background-color 0.5s ease;
}

        body.is-my-turn-bg {
            background-color: #6a2e2e;
}

        .waiting-players-list {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            text-align: left;
        }
        .waiting-players-list h3 {
            color: #004d40;
            margin-top: 0;
            border-bottom: 2px solid #00796b;
            padding-bottom: 10px;
        }
        .waiting-player-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 18px;
        }
        .waiting-player-item:last-child {
            border-bottom: none;
        }
        .player-number {
            font-weight: bold;
            color: #00796b;
            margin-right: 15px;
            width: 80px;
        }
        .host-badge {
            background-color: #ffb300;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: auto;
            font-weight: bold;
        }

        .screen { display: none;
}

        .active { display: block; }

        /* Login and Room screens use a light container */
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        
        /* Game screen uses the dark theme directly */
        #game-screen.container {
            max-width: 1200px;
            background-color: transparent;
            color: #E0E0E0;
            box-shadow: none;
        }

        h1, h2 {
            color: #004d40;
        }
        
        #game-screen h1, #game-screen h2, #game-screen h3 {
             color: #e0f2f1;
        }

        input[type="text"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background-color: #00796b; /* ティールグリーン */
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #004d40; }
        button:disabled {
            background-color: #999;
            color: #e0e0e0;
            cursor: not-allowed;
        }

        .game-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 5px;
        }

        .game-status-icons {
            font-size: 32px;
            display: flex;
            gap: 15px;
        }
        
        .players-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap; /* プレイヤーが増えても改行されるように */
            gap: 10px;
            margin-bottom: 20px;
            min-height: 120px;
        }

        .player-box {
            border: 2px solid #00796b;
            border-radius: 8px;
            padding: 10px;
            width: 150px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .player-box.is-turn {
            border-color: #80cbc4; /* 明るいティール */
            box-shadow: 0 0 15px #80cbc4;
            font-weight: bold;
            transform: scale(1.05);

        .player-box.finished {
            opacity: 0.5;

        }
        .other-player-cards {

            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
            margin-top: 5px;
        }
        .card-back {
            width: 12px;
            height: 18px;
            background-color: #666;
            border: 1px solid white;
            border-radius: 2px;
        }

        .field {

            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            background-color: rgba(0,0,0,0.1);
        }

        .my-hand-container {
            background-color: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }

        .card {
            border: 1px solid #999;
            border-radius: 8px;
            width: 70px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
cursor: pointer;
            user-select: none;
            position: relative;
            padding: 5px;
            box-sizing: border-box;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            color: #333;
            transition: all 0.2s;
}

        .card.selected {
            transform: translateY(-10px);
            box-shadow: 0 6px 10px #00796b;
            border-color: #00796b;
        }
        .card.red { color: red; }
        .card.joker { background-color: #f0f0f0; }
        .card.is-transformed .card-number {

        }
        .card.is-transformed .suit {

        }
        .card .suit { font-size: 1em; }
        .card .card-number { font-size: 1.2em; }


        #room-info-container {

            align-items: center;
            gap: 10px;

            color: #a0a0a0;

        #copy-room-id-button {

            font-size: 14px;

        /* Modal Styles */

            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;

        #modal-overlay.hidden { display: none; }
        #modal-container {
            background-color: #fff;
            color: #333;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            text-align: center;

        #modal-body {

            overflow-y: auto;

            color: #333;
        }
        .modal-joker-transform button.selected {
            background-color: #004d40;
            color: white;
        }
        .modal-rank-selection button.selected {
            background-color: #004d40;

        #results-table {
            width: 100%;
            margin-top: 20px;

        #results-table th, #results-table td {
            border: 1px solid #ddd;
            padding: 8px;

        #results-table th {
            background-color: #f2f2f2;

        #cutin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            pointer-events: none;
            opacity: 0;

        #cutin-overlay.visible { opacity: 1; }
        #cutin-box {
            background: rgba(255, 255, 255, 0.9);
            color: #004d40;
            padding: 30px 60px;
            border-radius: 10px;

        #log-header {

        #log-messages {

        #log-messages p { margin: 5px 0; }
        #show-log-button {

            left: 10px;
            bottom: 10px;
            z-index: 901;
        }
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: auto;
        }
        .ui-overlay {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }
        .ui-overlay button, .ui-overlay input {
            pointer-events: auto;
        }

    </style>

</head>

    <div id="cutin-overlay" class="hidden">

    <script type="module">
        // ▼▼▼ ここにFirebaseの設定を貼り付け ▼▼▼

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, arrayUnion, serverTimestamp, runTransaction, collection, query, where, orderBy, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        const showAlert = (message) => { alert(message); };

        const nameInput = document.getElementById('name-input');

        const roomInfoSpan = document.getElementById('room-info');
        const copyRoomIdButton = document.getElementById('copy-room-id-button');
        const startGameButton = document.getElementById('start-game-button');
        const playButton = document.getElementById('play-button');
        const passButton = document.getElementById('pass-button');
        const myNameSpan = document.getElementById('my-name');
        const revolutionIcon = document.getElementById('revolution-icon');

        const shibariIcon = document.getElementById('shibari-icon');

        // Modal DOM Elements
        const modalOverlay = document.getElementById('modal-overlay');

        const modalBody = document.getElementById('modal-body');

        // Cut-in & Log DOM Elements
        const cutinOverlay = document.getElementById('cutin-overlay');

        const cutinEffectName = document.getElementById('cutin-effect-name');

        const showLogButton = document.getElementById('show-log-button');

        function initThreeJS() {
            const canvas = document.getElementById('webgl-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 20);
            camera.lookAt(0, 0, 0);
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 20, 10);
            scene.add(dirLight);
            const tableGeo = new THREE.CylinderGeometry(12, 12, 0.5, 64);
            const tableMat = new THREE.MeshStandardMaterial({ color: 0x004d40, roughness: 0.8 });
            tableMesh = new THREE.Mesh(tableGeo, tableMat);
            tableMesh.position.y = -0.25;
            scene.add(tableMesh);
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
        let isDraggingPassCard = false;
        let draggedCardMesh = null;
        let passAssignments = {};
        let interactiveMode = null;
        let interactiveData = null; 
        const passConfirmBtn = document.createElement('button');
        passConfirmBtn.textContent = '決定';
        passConfirmBtn.style.position = 'fixed'; passConfirmBtn.style.bottom = '80px'; passConfirmBtn.style.left = '50%'; passConfirmBtn.style.transform = 'translateX(-50%)'; passConfirmBtn.style.zIndex = '1000'; passConfirmBtn.style.display = 'none';
        document.body.appendChild(passConfirmBtn);

        window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        window.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);
        window.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('touchend', onPointerUp);
        window.addEventListener('click', onCanvasClick);
        
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        
        function getPointerPos(event) {
            let clientX = event.clientX, clientY = event.clientY;
            if (event.changedTouches && event.changedTouches.length > 0) {
                clientX = event.changedTouches[0].clientX; clientY = event.changedTouches[0].clientY;
            } else if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX; clientY = event.touches[0].clientY;
            }
            return { x: (clientX / window.innerWidth) * 2 - 1, y: -(clientY / window.innerHeight) * 2 + 1 };
        }

        function onPointerDown(event) {
            if (interactiveMode === 'pass') {
                let pos = getPointerPos(event);
                raycaster.setFromCamera(new THREE.Vector2(pos.x, pos.y), camera);
                const intersects = raycaster.intersectObjects(scene.children);
                for (let i = 0; i < intersects.length; i++) {
                    const obj = intersects[i].object;
                    if (obj.userData && obj.userData.card && obj.userData.isMine) {
                        isDraggingPassCard = true;
                        draggedCardMesh = obj;
                        break;
                    }
                }
            } else if (interactiveMode === 'steal') {
                let pos = getPointerPos(event);
                raycaster.setFromCamera(new THREE.Vector2(pos.x, pos.y), camera);
                const intersects = raycaster.intersectObjects(scene.children);
                for (let i = 0; i < intersects.length; i++) {
                    const obj = intersects[i].object;
                    if (obj.userData && obj.userData.isStealTarget) {
                        isDraggingPassCard = true;
                        draggedCardMesh = obj;
                        interactiveData.startY = getPointerPos(event).y;
                        break;
                    }
                }
            }
        }

        function onPointerMove(event) {
            if (isDraggingPassCard && draggedCardMesh) {
                let pos = getPointerPos(event);
                raycaster.setFromCamera(new THREE.Vector2(pos.x, pos.y), camera);
                if (interactiveMode === 'pass') {
                    let intersectPoint = new THREE.Vector3();
                    raycaster.ray.intersectPlane(dragPlane, intersectPoint);
                    if (intersectPoint) {
                        draggedCardMesh.position.copy(intersectPoint);
                        draggedCardMesh.position.y = 1.0;
                    }
                } else if (interactiveMode === 'steal') {
                    let deltaY = pos.y - interactiveData.startY;
                    if (deltaY > 0) {
                        draggedCardMesh.position.y = 1.0 + deltaY * 10;
                    }
                }
            }
        }

        function onPointerUp(event) {
            if (isDraggingPassCard && draggedCardMesh) {
                if (interactiveMode === 'pass') {
                    let closestPlayer = null;
                    let minDist = Infinity;
                    let roomData = interactiveData.roomData;
                    const numPlayers = roomData.players.length;
                    const myIndex = roomData.players.findIndex(p => p.id === currentPlayer.id);
                    
                    roomData.players.forEach((p, i) => {
                        if (p.id !== currentPlayer.id && p.rank === null) {
                            const posIndex = (i - myIndex + numPlayers) % numPlayers;
                            const pos = playerPositions[posIndex];
                            const pVec = new THREE.Vector3(pos.x, 0, pos.z);
                            const dist = draggedCardMesh.position.distanceTo(pVec);
                            if (dist < 4.0 && dist < minDist) {
                                minDist = dist;
                                closestPlayer = p.id;
                            }
                        }
                    });

                    if (closestPlayer) {
                        passAssignments[draggedCardMesh.userData.card.uid] = closestPlayer;
                    } else {
                        delete passAssignments[draggedCardMesh.userData.card.uid];
                    }
                    
                    passConfirmBtn.disabled = Object.keys(passAssignments).length !== interactiveData.count;
                    update3DScene(roomData, roomData.players.find(p=>p.id===currentPlayer.id), true); 
                } else if (interactiveMode === 'steal') {
                    let pos = getPointerPos(event);
                    let deltaY = pos.y - interactiveData.startY;
                    if (deltaY > 0.5) {
                        draggedCardMesh.visible = false;
                        interactiveData.stolenCount++;
                        interactiveData.onStolen(draggedCardMesh.userData.card);
                    } else {
                        gsap.to(draggedCardMesh.position, { y: 0.1, duration: 0.3 });
                    }
                }
            }
            isDraggingPassCard = false;
            draggedCardMesh = null;
        }

            animateThreeJS();
        }

        function generateCardTexture(card) {


            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#cccccc';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            if (card.suit === 'joker' && !card.mimics) {
                ctx.fillStyle = '#333333';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('JOKER', canvas.width / 2, canvas.height / 2);
            } else {
                const displayCard = card.mimics ? card.mimics : card;
                const suitSymbols = { spade: '♠', heart: '♥', diamond: '♦', club: '♣' };
                const color = (displayCard.suit === 'heart' || displayCard.suit === 'diamond') ? '#ff0000' : '#000000';
                ctx.fillStyle = color;
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(suitSymbols[displayCard.suit], canvas.width / 2, 60);
                ctx.font = 'bold 48px Arial';
                ctx.fillText(numberToString(displayCard.number), canvas.width / 2, 140);
                ctx.font = 'bold 36px Arial';
                ctx.fillText(suitSymbols[displayCard.suit], canvas.width / 2, 220);
                if (card.mimics) {
                    ctx.fillStyle = '#00796b';
                    ctx.font = '16px Arial';
                    ctx.fillText('JOKER', canvas.width / 2, 20);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        function getCardBackTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#002244';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
            return new THREE.CanvasTexture(canvas);
        }

        function createCardMesh3D(card) {
            const geometry = new THREE.BoxGeometry(1.5, 0.05, 2.5);
const frontTex = generateCardTexture(card);
            const backTex = getCardBackTexture();
            const sideMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
const materials = [
                sideMat,
                sideMat,
                new THREE.MeshStandardMaterial({ map: frontTex }),
                new THREE.MeshStandardMaterial({ map: backTex }),
                sideMat,
         
               sideMat
            ];
const mesh = new THREE.Mesh(geometry, materials);
            mesh.userData = { card: card, isSelected: false };
            return mesh;
}

        function onCanvasClick(event) {
            if (interactiveMode) return;
            if (document.getElementById('game-screen').classList.contains('active') === false) return;
            let clientX = event.clientX;
            let clientY = event.clientY;

            if (event.changedTouches && event.changedTouches.length > 0) {
                clientX = event.changedTouches[0].clientX;
                clientY = event.changedTouches[0].clientY;
            } else if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }

mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
const intersects = raycaster.intersectObjects(scene.children);
            for (let i = 0; i < intersects.length; i++) {
                const obj = intersects[i].object;

                if (obj.userData && obj.userData.card) {
                    if (obj.userData.isMine) {
                        handleCardClick(obj.userData.card);
                    }
                    break;
                }
            }
        }

        function update3DScene(roomData, me) {
            const numPlayers = roomData.players.length;
            const myIndex = roomData.players.findIndex(p => p.id === me.id);
            const radius = 9;
            playerPositions = [];
            for (let i = 0; i < numPlayers; i++) {
                const angle = (i / numPlayers) * Math.PI * 2;
                playerPositions.push({
                    x: Math.sin(angle) * radius,
                    z: Math.cos(angle) * radius,
                    angle: angle
                });
            }
            
            const newCardMeshes = {};
            const uidsInScene = new Set();

            const labelsContainer = document.getElementById('player-labels-container');
            let activeLabels = new Set();

            roomData.players.forEach((player, i) => {
                const posIndex = (i - myIndex + numPlayers) % numPlayers;
                const pos = playerPositions[posIndex];
                
                activeLabels.add(player.id);
                if (!playerLabels[player.id]) {
                    let el = document.createElement('div');
                    el.style.position = 'absolute';
                    el.style.color = 'white';
                    el.style.background = 'rgba(0,0,0,0.6)';
                    el.style.padding = '4px 8px';
                    el.style.borderRadius = '4px';
                    el.style.fontWeight = 'bold';
                    el.style.fontSize = '14px';
                    el.style.pointerEvents = 'none';
                    labelsContainer.appendChild(el);
                    playerLabels[player.id] = { el: el, pos3D: new THREE.Vector3(pos.x, 0, pos.z) };
                }
                playerLabels[player.id].el.textContent = player.name + (player.id === me.id ? '(あなた)' : '') + (player.rank ? ` [${player.rank}位]` : '');
                playerLabels[player.id].pos3D.set(pos.x, 0, pos.z);

                if (player.hand) {

                    player.hand.forEach((card, j) => {
                        const uid = card.uid;
                        uidsInScene.add(uid);
                        let mesh = cardMeshes[uid];
                        if (!mesh) {
                            mesh = createCardMesh3D(card);
                            mesh.position.set(pos.x, 0, pos.z);
                            scene.add(mesh);
                        }
                        newCardMeshes[uid] = mesh;
                        const isMine = player.id === me.id;
                        mesh.userData.isMine = isMine;
                        
                        const spread = isMine ? 1.0 : 0.3;
                        const offset = (j - player.hand.length / 2) * spread;
                        
                        mesh.rotation.order = 'YXZ';
                        const depthOffset = j * 0.01;
                        const targetX = pos.x + Math.cos(pos.angle) * offset - Math.sin(pos.angle) * depthOffset;
                        const targetZ = pos.z - Math.sin(pos.angle) * offset - Math.cos(pos.angle) * depthOffset;
                        let targetY = isMine ? 1.5 : 2.5;
                        let targetRotX = isMine ? Math.PI / 4 : Math.PI / 2;
                        let targetRotY = isMine ? -pos.angle : pos.angle;
                        let targetRotZ = 0;




                        if (isMine) {
                            if (interactiveMode === 'pass' && passAssignments[uid]) {
                                const targetId = passAssignments[uid];
                                const tIndex = roomData.players.findIndex(p => p.id === targetId);
                                const posIndexTarget = (tIndex - myIndex + numPlayers) % numPlayers;
                                const tPos = playerPositions[posIndexTarget];
                                targetX = tPos.x * 0.8;
                                targetZ = tPos.z * 0.8;
                                targetY = 1.0;
                            } else {
                                const isSelected = selectedCards.some(sc => sc.uid === uid);
                                if (isSelected) {
                                    targetY += 1.0;
                                }
                            }
                        }

                        if (!isDraggingPassCard || draggedCardMesh !== mesh) {
                            gsap.to(mesh.position, { x: targetX, y: targetY, z: targetZ, duration: 0.5 });
                            gsap.to(mesh.rotation, { x: targetRotX, y: targetRotY, z: targetRotZ, duration: 0.5 });
                        }
                    });
                }
            });

            let roundPileCount = 0;
            if (roomData.roundPile) {
                roomData.roundPile.forEach((card, j) => {
                    const uid = card.uid;
                    uidsInScene.add(uid);
                    let mesh = cardMeshes[uid];
                    if (!mesh) {
                        mesh = createCardMesh3D(card);
                        mesh.position.set(0, 5, 0);
                        scene.add(mesh);
                    }
                    newCardMeshes[uid] = mesh;
                    gsap.to(mesh.position, { x: 0, y: 0.26 + j * 0.005, z: 0, duration: 0.5 });
                    gsap.to(mesh.rotation, { x: 0, y: 0, z: 0, duration: 0.5 });
                });
                roundPileCount = roomData.roundPile.length;
            }

            roomData.field.forEach((card, j) => {
                const uid = card.uid;
                uidsInScene.add(uid);
                let mesh = cardMeshes[uid];
                if (!mesh) {
                    mesh = createCardMesh3D(card);
                    mesh.position.set(0, 5, 0);
                    scene.add(mesh);
                }
                newCardMeshes[uid] = mesh;
                const offset = (j - roomData.field.length / 2) * 1.0;
                gsap.to(mesh.position, { x: offset, y: 0.26 + roundPileCount * 0.005 + 0.01, z: 0, duration: 0.5 });
                gsap.to(mesh.rotation, { x: 0, y: 0, z: 0, duration: 0.5 });
            });
            if (roomData.discardPile) {
                roomData.discardPile.forEach((card, j) => {
                    const uid = card.uid;
                    uidsInScene.add(uid);
                    let mesh = cardMeshes[uid];
                    if (!mesh) {
                        mesh = createCardMesh3D(card);
                        mesh.position.set(0, 5, 0);
                        scene.add(mesh);
                    }
                    newCardMeshes[uid] = mesh;
                    gsap.to(mesh.position, { x: -4, y: 0.26 + j * 0.05, z: 0, duration: 0.5 });
                    gsap.to(mesh.rotation, { x: Math.PI, y: 0, z: 0, duration: 0.5 });
                });
            }

            Object.keys(cardMeshes).forEach(uid => {

                if (!uidsInScene.has(uid)) {
                    scene.remove(cardMeshes[uid]);
                }
            });
            cardMeshes = newCardMeshes;

            for(let id in playerLabels) {
                if(!activeLabels.has(id)) {
                    playerLabels[id].el.remove();
                    delete playerLabels[id];
                }
            }
        }

        function generatePlayerId() { return Math.random().toString(36).substring(2, 10); }

        function getCardStrength(card) {
            if (card.suit === 'joker' && !card.mimics) return 99;
            const cardToEval = card.mimics ? card.mimics : card;
            let value = cardToEval.number === 1 ? 14 : (cardToEval.number === 2 ? 15 : cardToEval.number);
            return value;
        }
        
        function getCardValue(card, roomData) {
            // 単体のJokerは、どんな状況でも常に最強とする特別ルールを適用
            if (card.suit === 'joker' && !card.mimics) {
                return 99; // 革命やJバックの影響を受けずに常に最強の値を返す
            }
            
            const strengthReversed = roomData.isRevolution ^ roomData.isJBackActive;
            // XOR
            const baseStrength = getCardStrength(card);
            
            // Joker以外のカードは、革命やJバックの影響を受ける
            return strengthReversed ?
                16 - baseStrength : baseStrength;
        }
        
        function getNextPlayerId(players, currentId, direction, skipCount) {
            const activePlayers = players.filter(p => p.rank === null).sort((a,b) => a.order - b.order);
            if (activePlayers.length === 0) return null;
            if (activePlayers.length === 1) return activePlayers[0].id;
            
            let currentIndex = activePlayers.findIndex(p => p.id === currentId);
            if (currentIndex === -1) { 
                const originalPlayer = players.find(p => p.id === currentId) || { order: -1 };
                const nextOrderedPlayer = activePlayers.find(p => p.order > originalPlayer.order);
                currentIndex = nextOrderedPlayer ? activePlayers.indexOf(nextOrderedPlayer) -1 : activePlayers.length -1;
            }
            
            const totalMoves = 1 + skipCount;
            const nextIndex = (currentIndex + (totalMoves * direction) + activePlayers.length * totalMoves) % activePlayers.length;
            return activePlayers[nextIndex].id;
        }

        function numberToString(num) {
            const map = { 1: 'A', 2: '2', 11: 'J', 12: 'Q', 13: 'K', 15: 'Joker' };
            return map[num] || String(num);
        }

        function cleanCard(card) {
            return { suit: card.suit, number: card.number, uid: card.uid };
        }
        
        function cardsToString(cards) {
            if (cards.length === 0) return "";
            const suitSymbols = { spade: '♠', heart: '♥', diamond: '♦', club: '♣' };
            return cards.map(c => {
                const cardToDisplay = c.mimics ? c.mimics : c;
                let cardStr = '';
                if (cardToDisplay.suit === 'joker') {
                    cardStr = 'Joker';
                } else {
                    cardStr = `${suitSymbols[cardToDisplay.suit]}${numberToString(cardToDisplay.number)}`;
                }
                if (c.mimics) {
                    return `Joker->[${cardStr}]`;
                }
                return cardStr;
            }).join(', ');
        }


        function createCardElement(card) {

            } else {

            }

        }
        
        function isStair(cards) {
            if (cards.length < 3) return false;
            const cardsToEval = cards.map(c => c.mimics ? { ...c.mimics, uid: c.uid } : c);
            const realCards = cardsToEval.filter(c => c.suit !== 'joker');
            if (realCards.length === 0) return false;

            const suit = realCards[0].suit;
            if (!realCards.every(c => c.suit === suit)) return false;

            const strengths = realCards.map(c => getCardStrength(c)).sort((a,b) => a-b);
            
            // 重複チェック
            for (let i = 0; i < strengths.length - 1; i++) {
                if (strengths[i] === strengths[i+1]) return false;
            }

            let jokersAvailable = cards.length - realCards.length;
            
            for(let i = 0; i < strengths.length - 1; i++) {
                const diff = strengths[i+1] - strengths[i] - 1;
                if (diff < 0) {
                    // 通常ありえないが、ソートされているので重複と同じ
                    return false;
                }
                if (diff > 0) {
                    jokersAvailable -= diff;
                }
            }
            
            return jokersAvailable >= 0;
        }
        
                function isValidPlay(playCards, myHand, roomData) {

            if (new Set(playCards.map(c => c.uid)).size === myHand.length && isOnly2s) {

                    return { valid: false, message: '他のカードと出す場合、Jokerは必ず何かに擬態させてください。' };
                }
            } 
            else if (jokers.length > 0 && others.length === 0) {
                if (jokers.some(j => j.mimics)) {
                    return { valid: false, message: 'Jokerのみで出す場合は擬態できません。' };
                }
            }

            const cardsToEval = playCards.map(c => c.mimics ? { ...c.mimics, uid: c.uid } : c);
            const isPlayStair = isStair(cardsToEval);
            
            if (!isPlayStair) {
                const realCards = cardsToEval.filter(c => c.suit !== 'joker');
                const playedNumber = realCards.length > 0 ? realCards[0].number : (cardsToEval.length > 0 ? cardsToEval[0].number : null);
                if (!cardsToEval.every(c => c.number === playedNumber)) {
                    return { valid: false, message: '同じ数字のカードか、階段で出してください。' };
                }
            }
            
            if (roomData.field.length === 0) return { valid: true };

            if (playCards.length === 1 && playCards[0].suit === 'spade' && playCards[0].number === 3 &&
                roomData.field.length === 1 && roomData.field[0].suit === 'joker' && !roomData.field[0].mimics) {
                return { valid: true };
            }
            
            const isFieldStair = isStair(roomData.field);
            if(isPlayStair !== isFieldStair) return { valid: false, message: '場と同じ種類（通常 or 階段）で出してください。' };
            if (playCards.length !== roomData.field.length) return { valid: false, message: '場と同じ枚数のカードを出してください。' };
            
            let playValue, fieldValue;
            if (isPlayStair) {
                const playBaseCard = playCards.sort((a, b) => getCardStrength(a) - getCardStrength(b))[0];
                const fieldBaseCard = roomData.field.sort((a, b) => getCardStrength(a) - getCardStrength(b))[0];
                playValue = getCardValue(playBaseCard, roomData);
                fieldValue = getCardValue(fieldBaseCard, roomData);
            } else {
                playValue = getCardValue(playCards[0], roomData);
                fieldValue = getCardValue(roomData.field[0], roomData);
            }

            if (playValue <= fieldValue) return { valid: false, message: '場に出ているカードより強いカードを出してください。' };
            
            return { valid: true };
        }

        function handlePendingAction(roomData) {
            const action = roomData.pendingActions && roomData.pendingActions[0];
            if (!action || action.actorId !== currentPlayer.id || modalOverlay.classList.contains('visible-modal')) {
                if ((!roomData.pendingActions || roomData.pendingActions.length === 0) && !modalOverlay.classList.contains('hidden')) closeModal();
                return;
            }
            const me = roomData.players.find(p => p.id === currentPlayer.id);
            const targetablePlayers = roomData.players.filter(p => p.id !== me.id && p.rank === null);
            switch(action.type) {
                // ★修正(4): 効果発動を強制にするため、キャンセルできないモーダルに変更
                case 'pass_select_player':
                case 'pass_select_cards':
                    passAssignments = {};
                    interactiveMode = 'pass';
                    interactiveData = { count: action.count, roomData: roomData };
                    passConfirmBtn.style.display = 'block';
                    passConfirmBtn.disabled = true;
                    passConfirmBtn.onclick = () => {
                        interactiveMode = null;
                        passConfirmBtn.style.display = 'none';
                        let distribution = {};
                        for (let uid in passAssignments) {
                            let tid = passAssignments[uid];
                            if (!distribution[tid]) distribution[tid] = [];
                            distribution[tid].push(me.hand.find(c => c.uid === uid));
                        }
                        executeDistributedGive(distribution);
                    };
                    break;

                case 'discard_select_cards':
                    showCardSelectionModal('捨てるカードを選んでください', me.hand, action.count, true, false)
                        .then(cardsToDiscard => executeDiscardCards(cardsToDiscard));
                    break;
               case 'bomber_select_rank':
                     showRankSelectionModal('破壊する数字を選んでください', action.count, me.hand)
                        .then(ranks => executeBomber(ranks));
                    break;
                case 'collect_select_cards':
                    showCardSelectionModal('回収するカードを選んでください', roomData.discardPile.map(c => cleanCard(c)), action.count, true, false, me.hand)
                        .then(cardsToCollect => executeCollectCards(cardsToCollect));
                    break;
               case 'steal_select_player':
                    const validTargets = targetablePlayers.filter(p => p.hand.length > 0);
                    if (action.count > 1 && validTargets.length > 0) {
                showStealDistributionModal('カードを奪う相手と枚数を指定してください', validTargets, action.count)
                            .then(distribution => {
                                if (distribution.length > 0) 
                                {
                                    startInteractiveSteal(distribution, roomData);
                                
} else {
                              
                                     clearPendingActions();
                               
 }
                            });
 } else if (validTargets.length > 0) {
                         showStealDistributionModal('カードを奪う相手と枚数を指定してください', validTargets, action.count)
                            .then(distribution => {
                                if (distribution.length > 0) startInteractiveSteal(distribution, roomData);
                                else clearPendingActions();
                            }).catch(() => clearPendingActions());
 } else {

                        showModal("対象不在", "カードを奪える相手がいません。", {showConfirm: true, confirmText: "OK", showCancel: false})
                            .then(() => { closeModal(); clearPendingActions(); });
                    }
                    break;
                case 'eight_cut':
                    setTimeout(() => executeEightCut(), 1500);
                    break;
                case 'auto_clear_field':
                    setTimeout(() => executeAutoClearField(), 1500);
                    break;
            }
        }

        // --- Game Logic Helpers ---
        function handlePlayerFinish(players, finishedPlayerId) {
            const finishedCount = players.filter(p => p.rank !== null).length;
            const newRank = finishedCount + 1;
            const logs = [];
            const updatedPlayers = players.map(p => {
                if (p.id === finishedPlayerId && p.rank === null) {
                    const message = `${p.name}が${newRank}位で上がりました！`;
                    logs.push({ timestamp: Date.now(), message: message });
                    showCutIn(p.name, `${newRank}位でゴール！`);
                    return { ...p, rank: newRank };
                }
                return p;
            });
            return { updatedPlayers, 上がりLog: logs };
        }

        
        function checkGameEnd(state) {
            const activePlayers = state.players.filter(p => p.rank === null);
            if (activePlayers.length <= 1) {
                state.gameState = 'finished';
                if (activePlayers.length === 1) {
                    const lastPlayer = activePlayers[0];
                    const rankCount = state.players.filter(p => p.rank !== null).length;
                    state.players = state.players.map(p => p.id === lastPlayer.id ? {...p, rank: rankCount + 1} : p);
                }
            }
            return state;
        }


        // --- Action Execution Functions ---
                async function executeAction(actionFn, logMessageFn, logContext) {
            const roomRef = doc(db, 'rooms', currentRoomId);
            try {
                await runTransaction(db, async (transaction) => {
                    const roomSnap = await transaction.get(roomRef);
                    if (!roomSnap.exists()) throw new Error("Room not found");
                    let roomData = roomSnap.data();
                    const me = roomData.players.find(p => p.id === currentPlayer.id);
                    
                    let { players, discardPile, logContext: actionLogContext } = await actionFn(roomData, me);
                    const finalLogContext = logContext || actionLogContext || {};
                    const logMessage = logMessageFn(finalLogContext);
    
                    let logEntry = {timestamp: Date.now(), message: logMessage};
                    if (finalLogContext.effect) {
                        logEntry.effect = finalLogContext.effect;
                    }
                    let logEntries = [logEntry];
                    
                    let tempPlayers = players;

                    // アクションの結果、手札が0枚になった全プレイヤーをチェックする
                    const originalPlayers = roomData.players;
                    tempPlayers.forEach(p => {
                        const originalPlayer = originalPlayers.find(op => op.id === p.id);
                        if (p.hand.length === 0 && originalPlayer && originalPlayer.hand.length > 0 && p.rank === null) {
                            const { updatedPlayers, 上がりLog } = handlePlayerFinish(tempPlayers, p.id);
                            tempPlayers = updatedPlayers;
                            logEntries.push(...上がりLog);
                        }
                    });
                    players = tempPlayers;
                    
                    const newPendingActions = roomData.pendingActions ? roomData.pendingActions.slice(1) : [];
                    
                    let nextState = {
                        players: players,
                        discardPile: discardPile || roomData.discardPile,
                        pendingActions: newPendingActions,
                        turnPlayerId: roomData.turnPlayerId
                    };
                    
                    if (newPendingActions.length === 0) {
                        nextState.turnPlayerId = getNextPlayerId(players, me.id, roomData.turnDirection, 0);
                    }
                    
                    const finalState = checkGameEnd(nextState);
                    transaction.update(doc(db, 'rooms', currentRoomId), {...finalState, log: arrayUnion(...logEntries)});
                });
            } catch (e) {
                showAlert(`エラー: ${e.message}`);
                await clearPendingActions();
            }
        }
        
        function executeGiveCards(targetId, cardsToGive) {
            executeAction(
                (roomData, me) => {
                    const giveUids = new Set(cardsToGive.map(c => c.uid));
                    const newMyHand = me.hand.filter(c => !giveUids.has(c.uid));
                    const targetPlayer = roomData.players.find(p => p.id === targetId);
                    const players = roomData.players.map(p => {
                        if (p.id === me.id) return { ...p, hand: newMyHand };
                        if (p.id === targetId) {
                                                        return {
                                ...p,
                                hand: [...p.hand, ...cardsToGive].sort((a,b) => getCardStrength(a) - getCardStrength(b)),
                                privateEvent: { id: Date.now(), type: 'receive_cards', actor: me.name, cards: cardsToGive }
                            };
                        }
                        return p;
                    });
                    return { players, logContext: { target: targetPlayer.name, cards: cardsToGive } };
                },

                (ctx) => `${currentPlayer.name}が${ctx.target}にカードを${ctx.cards.length}枚渡しました。`
            );
        }
        
        function executeDiscardCards(cardsToDiscard) {
             executeAction(
                (roomData, me) => {
                    const discardUids = new Set(cardsToDiscard.map(c => c.uid));
                    const newMyHand = me.hand.filter(c => !discardUids.has(c.uid));
                    const players = roomData.players.map(p => p.id === me.id ? { ...p, hand: newMyHand } : p);
                    return { players, discardPile: [...roomData.discardPile, ...cardsToDiscard.map(c => cleanCard(c))], logContext: { cards: cardsToDiscard } };
                },
                (ctx) => `${currentPlayer.name}がカード(${cardsToString(ctx.cards)})を捨てました。`
            );
        }
        
        function executeBomber(ranks) {
            executeAction(
                (roomData, me) => {
                    const rankSet = new Set(ranks);
                    let allDiscarded = [];
                    let finishedPlayerIds = [];

                    const players = roomData.players.map(p => {
                        if (p.rank !== null) return p;
                        const discarded = p.hand.filter(c => rankSet.has(c.number) || (rankSet.has(15) && c.suit === 'joker'));
                        const newHand = p.hand.filter(c => !discarded.find(dc => dc.uid === c.uid));
                        if(discarded.length > 0) allDiscarded.push(...discarded);
                        if(newHand.length === 0 && p.hand.length > 0) finishedPlayerIds.push(p.id);
                        return { ...p, hand: newHand };
                    });

                    if (finishedPlayerIds.length > 0) {
                        const finishedCount = roomData.players.filter(p => p.rank !== null).length;
                        const newRank = finishedCount + 1;
                        finishedPlayerIds.forEach(id => {
                            const pIndex = players.findIndex(p => p.id === id);
                            players[pIndex].rank = newRank;
                        });
                    }

                    return { players, discardPile: [...roomData.discardPile, ...allDiscarded.map(c => cleanCard(c))], logContext: { ranks } };
                },
                                (ctx) => `${currentPlayer.name}が数字[${ctx.ranks.map(numberToString).join(',')}]を破壊しました。`,
                {
                    ranks,
                    effect: {
                        card: `数字[${ranks.map(numberToString).join(',')}]`,
                        name: 'Qボンバー'
                    }
                }
            );
        }



        function executeDistributedGive(distribution) {
            executeAction(
                (roomData, me) => {
                    let givenUids = new Set();
                    let logDetails = [];
                    for(let tid in distribution) {
                        distribution[tid].forEach(c => givenUids.add(c.uid));
                    }
                    const newMyHand = me.hand.filter(c => !givenUids.has(c.uid));
                    
                    const players = roomData.players.map(p => {
                        if (p.id === me.id) return { ...p, hand: newMyHand };
                        if (distribution[p.id]) {
                            const cardsToGive = distribution[p.id];
                            logDetails.push(`${p.name}に${cardsToGive.length}枚`);
                            return {
                                ...p,
                                hand: [...p.hand, ...cardsToGive].sort((a,b) => getCardStrength(a) - getCardStrength(b)),
                                privateEvent: { id: Date.now(), type: 'receive_cards', actor: me.name, cards: cardsToGive }
                            };
                        }
                        return p;
                    });
                    return { players, logContext: { logDetails } };
                },
                (ctx) => `${currentPlayer.name}がカードを渡しました。(${ctx.logDetails.join(', ')})`
            );
        }

        async function startInteractiveSteal(distribution, roomData) {
            interactiveMode = 'steal_anim';
            let allStolenCards = {}; 
            
            for (let dist of distribution) {
                const targetId = dist.playerId;
                const count = dist.count;
                const targetPlayer = roomData.players.find(p => p.id === targetId);
                if(!targetPlayer || targetPlayer.hand.length === 0) continue;

                const numPlayers = roomData.players.length;
                const myIndex = roomData.players.findIndex(p => p.id === currentPlayer.id);
                const tIndex = roomData.players.findIndex(p => p.id === targetId);
                const posIndex = (tIndex - myIndex + numPlayers) % numPlayers;
                const pos = playerPositions[posIndex];
                
                const targetCamPos = new THREE.Vector3(pos.x * 0.5, 5, pos.z * 0.5);
                const targetLookAt = new THREE.Vector3(pos.x, 0, pos.z);
                
                await new Promise(res => {
                    gsap.to(camera.position, { x: targetCamPos.x, y: targetCamPos.y, z: targetCamPos.z, duration: 1 });
                    gsap.to(camera.rotation, { 
                        onUpdate: function() { camera.lookAt(targetLookAt); }, 
                        duration: 1, 
                        onComplete: res 
                    });
                });

                let targetMeshes = [];
                let shuffledHand = [...targetPlayer.hand].sort(() => Math.random() - 0.5);
                shuffledHand.forEach((c, i) => {
                    let m = cardMeshes[c.uid];
                    if(m) {
                        m.userData.isStealTarget = true;
                        m.userData.card = c;
                        targetMeshes.push(m);
                        const offset = (i - shuffledHand.length/2) * 1.2;
                        gsap.to(m.position, { x: pos.x + Math.cos(pos.angle+Math.PI/2)*offset, y: 0.1, z: pos.z - Math.sin(pos.angle+Math.PI/2)*offset, duration: 0.5 });
                        gsap.to(m.rotation, { x: Math.PI, y: pos.angle, z: 0, duration: 0.5 });
                    }
                });

                interactiveMode = 'steal';
                let stolenForThisTarget = [];
                await new Promise(res => {
                    interactiveData = {
                        count: count,
                        stolenCount: 0,
                        startY: 0,
                        onStolen: (card) => {
                            stolenForThisTarget.push(card);
                            if (interactiveData.stolenCount >= count) {
                                res();
                            }
                        }
                    };
                });
                interactiveMode = 'steal_anim';
                allStolenCards[targetId] = stolenForThisTarget;
                
                await new Promise(res => {
                    gsap.to(camera.position, { x: 0, y: 15, z: 20, duration: 1 });
                    gsap.to(camera.rotation, { 
                        onUpdate: function() { camera.lookAt(0,0,0); }, 
                        duration: 1, 
                        onComplete: res 
                    });
                });
            }
            
            interactiveMode = null;
            executeAction(
                (currentRoomData, me) => {
                    let players = [...currentRoomData.players];
                    let logDetails = [];
                    let allStolenCardsForMe = [];
                    for(let tid in allStolenCards) {
                        let target = players.find(p => p.id === tid);
                        let stolenCards = allStolenCards[tid];
                        allStolenCardsForMe.push(...stolenCards);
                        logDetails.push({ name: target.name, count: stolenCards.length });
                        
                        let targetHand = target.hand.filter(c => !stolenCards.find(sc => sc.uid === c.uid));
                        const targetIndex = players.findIndex(p => p.id === tid);
                        players[targetIndex] = {
                            ...players[targetIndex],
                            hand: targetHand,
                            privateEvent: { id: Date.now() + Math.random(), type: 'stolen', actor: me.name, cards: stolenCards }
                        };
                    }
                    const myIndex = players.findIndex(p => p.id === me.id);
                    const newMyHand = [...me.hand, ...allStolenCardsForMe].sort((a,b) => getCardStrength(a)-getCardStrength(b));
                    players[myIndex] = {
                        ...players[myIndex],
                        hand: newMyHand,
                        privateEvent: { id: Date.now(), type: 'steal_success', target: '複数人', cards: allStolenCardsForMe }
                    };
                    return { players, logContext: { logDetails } };
                },
                (ctx) => {
                    const stealSummary = ctx.logDetails.map(d => `${d.name}から${d.count}枚`).join(', ');
                    return `${currentPlayer.name}が${stealSummary}奪いました。`;
                }
            );
        }

        function executeCollectCards(cardsToCollect) {
            executeAction(

                (roomData, me) => {
                    const collectUids = new Set(cardsToCollect.map(c => c.uid));
                    const newMyHand = [...me.hand, ...cardsToCollect].sort((a,b) => getCardStrength(a)-getCardStrength(b));
       
                     const players = roomData.players.map(p => p.id === me.id ? { ...p, hand: newMyHand } : p);
                    return {
                        players,
                        discardPile: roomData.discardPile.filter(c => !collectUids.has(c.uid)),
                        logContext: {
                            cards: cardsToCollect,
                            effect: {
                                card: me.name,
                                name: `${cardsToString(cardsToCollect)}を回収`
                            }
                        }
                    };
                },
                (ctx) => `${currentPlayer.name}が捨て札からカード(${cardsToString(ctx.cards)})を回収しました。`
      
             );
        }

        
        function executeStealCard(targetId, count) {
            executeAction(
                (roomData, me) => {
                    let target = roomData.players.find(p => p.id === targetId);
                    if (!target || target.hand.length === 0) throw new Error("対象にカードがありません。");
                    let targetHand = [...target.hand];
                    let stolenCards = [];
                    for(let i=0; i<count && targetHand.length > 0; i++) {
                        stolenCards.push(targetHand.splice(Math.floor(Math.random() * targetHand.length), 1)[0]);
                    }
                    const newMyHand = [...me.hand, ...stolenCards].sort((a,b) => getCardStrength(a)-getCardStrength(b));
                    const players = roomData.players.map(p => {
                                if (p.id === me.id) return { ...p, hand: newMyHand, privateEvent: { id: Date.now(), type: 'steal_success', target: target.name, cards: stolenCards } };
                        if (p.id === targetId) return { ...p, hand: targetHand, privateEvent: { id: Date.now() + 1, type: 'stolen', actor: me.name, cards: stolenCards } };
return p;
                    });
                    return { players, logContext: { target: target.name, count: count } };

                },
                (ctx) => `${currentPlayer.name}が${ctx.target}からカードを${ctx.count}枚奪いました。`
);

        }
                function executeDistributedSteal(distribution) {
            executeAction(
                (roomData, me) => {
                    let players = [...roomData.players];
                    let logDetails = [];
                    let allStolenCardsForMe = [];

                    distribution.forEach(({playerId, count}) => {
                        if (count <= 0) return;
                        
                        let target = players.find(p => p.id === playerId);
                        if (!target || target.hand.length < count) {
                            throw new Error(`${target.name}から指定された枚数を奪えません。`);
                        }
                        
                        let targetHand = [...target.hand];
                        let stolenCards = [];
                        for(let i=0; i < count && targetHand.length > 0; i++) {
                            stolenCards.push(targetHand.splice(Math.floor(Math.random() * targetHand.length), 1)[0]);
                        }
                        
                        allStolenCardsForMe.push(...stolenCards);
                        logDetails.push({ name: target.name, count });

                        const targetIndex = players.findIndex(p => p.id === playerId);
                        players[targetIndex] = {
                            ...players[targetIndex],
                            hand: targetHand,
                            privateEvent: { id: Date.now() + Math.random(), type: 'stolen', actor: me.name, cards: stolenCards }
                        };
                    });

                    const myIndex = players.findIndex(p => p.id === me.id);
                    const newMyHand = [...me.hand, ...allStolenCardsForMe].sort((a,b) => getCardStrength(a)-getCardStrength(b));
                    players[myIndex] = {
                        ...players[myIndex],
                        hand: newMyHand,
                        privateEvent: { id: Date.now(), type: 'steal_success', target: '複数人', cards: allStolenCardsForMe }
                    };

                    return { players, logContext: { logDetails } };
                },
                (ctx) => {
                    const stealSummary = ctx.logDetails.map(d => `${d.name}から${d.count}枚`).join(', ');
                    return `${currentPlayer.name}が${stealSummary}奪いました。`;
                }
            );
        }

        async function showStealDistributionModal(title, targetablePlayers, totalCount) {
            return new Promise((resolve, reject) => {
                const maxPossibleSteal = Math.min(totalCount, targetablePlayers.reduce((sum, p) => sum + p.hand.length, 0));
                
                const container = document.createElement('div');
                let assignments = {};
                targetablePlayers.forEach(p => assignments[p.id] = 0);

                const header = document.createElement('p');
                header.innerHTML = `合計 <b>${maxPossibleSteal}</b> 枚を下のプレイヤーに割り振ってください。`;
                container.appendChild(header);
                
                const remainingDiv = document.createElement('div');
                remainingDiv.style.fontWeight = 'bold';
                remainingDiv.style.marginBottom = '15px';
                container.appendChild(remainingDiv);

                const updateTotal = () => {
                    const totalAssigned = Object.values(assignments).reduce((sum, val) => sum + val, 0);
                    remainingDiv.textContent = `残り: ${maxPossibleSteal - totalAssigned}`;
                    modalConfirmButton.disabled = totalAssigned !== maxPossibleSteal;
                };

                targetablePlayers.forEach(p => {
                    const playerDiv = document.createElement('div');
                    playerDiv.style.display = 'flex';
                    playerDiv.style.justifyContent = 'space-between';
                    playerDiv.style.alignItems = 'center';
                    playerDiv.style.margin = '8px 0';

                    const nameLabel = document.createElement('span');
                    nameLabel.textContent = `${p.name} (手札: ${p.hand.length}枚)`;
                    
                    const controlsDiv = document.createElement('div');
                    const minusBtn = document.createElement('button');
                    minusBtn.textContent = '-';
                    minusBtn.style.width = '30px';
                    
                    const countSpan = document.createElement('span');
                    countSpan.textContent = '0';
                    countSpan.style.margin = '0 10px';
                    countSpan.style.display = 'inline-block';
                    countSpan.style.width = '20px';
                    
                    const plusBtn = document.createElement('button');
                    plusBtn.textContent = '+';
                    plusBtn.style.width = '30px';

                    minusBtn.onclick = () => {
                        if (assignments[p.id] > 0) {
                            assignments[p.id]--;
                            countSpan.textContent = assignments[p.id];
                            updateTotal();
                        }
                    };
                    plusBtn.onclick = () => {
                        const totalAssigned = Object.values(assignments).reduce((sum, val) => sum + val, 0);
                        if (totalAssigned < maxPossibleSteal && assignments[p.id] < p.hand.length) {
                            assignments[p.id]++;
                            countSpan.textContent = assignments[p.id];
                            updateTotal();
                        }
                    };

                    controlsDiv.appendChild(minusBtn);
                    controlsDiv.appendChild(countSpan);
                    controlsDiv.appendChild(plusBtn);
                    playerDiv.appendChild(nameLabel);
                    playerDiv.appendChild(controlsDiv);
                    container.appendChild(playerDiv);
                });

                showModal(title, container, { showConfirm: true, showCancel: false })
                    .then(() => {
                        const distribution = Object.entries(assignments)
                            .map(([playerId, count]) => ({ playerId, count }))
                            .filter(item => item.count > 0);
                        resolve(distribution);
                    })
                    .catch(reject);
                
                updateTotal();
            });
        }


                async function executeEightCut() {
            const roomRef = doc(db, 'rooms', currentRoomId);
            try {
                await runTransaction(db, async (transaction) => {
                    const roomSnap = await transaction.get(roomRef);
                    if (!roomSnap.exists()) throw new Error("Room not found");
                    const roomData = roomSnap.data();
                    const me = roomData.players.find(p => p.id === currentPlayer.id);

                    const newDiscard = [...roomData.discardPile, ...roomData.field.map(c => cleanCard(c))];
                    const logEntry = { timestamp: Date.now(), message: `${me.name}の(階段効果)8切りにより場が流れ、リセットされます。` };
                    
                    const newPendingActions = roomData.pendingActions.slice(1);
                    
                    let nextTurnPlayerId = me.id;
                    if (me && me.rank !== null) {
                        nextTurnPlayerId = getNextPlayerId(roomData.players, me.id, roomData.turnDirection, 0);
                    }

                    transaction.update(roomRef, {
                        field: [],
                        passCount: 0,
                        isJBackActive: false,
                        shibariSuits: [], // 縛り解除
                        discardPile: newDiscard,
                        pendingActions: newPendingActions,
                        turnPlayerId: nextTurnPlayerId,
                        log: arrayUnion(logEntry)
                     });

                });
            } catch (e) {
                showAlert(`8切り処理エラー: ${e.message}`);
                await clearPendingActions();
            }
        }

        async function executeAutoClearField() {
            const roomRef = doc(db, 'rooms', currentRoomId);
            try {
                await runTransaction(db, async (transaction) => {
                    const roomSnap = await transaction.get(roomRef);
                    if (!roomSnap.exists()) throw new Error("Room not found");
                    const roomData = roomSnap.data();
                    const me = roomData.players.find(p => p.id === currentPlayer.id);

                    const newDiscard = [...roomData.discardPile, ...roomData.roundPile, ...roomData.field.map(c => cleanCard(c))];
                    
                    const newPendingActions = roomData.pendingActions.slice(1);
                    
                    let nextTurnPlayerId = me.id;
                    if (me && me.rank !== null) {
                        nextTurnPlayerId = getNextPlayerId(roomData.players, me.id, roomData.turnDirection, 0);
                    }

                    transaction.update(roomRef, {
                        field: [],
                        roundPile: [],
                        passCount: 0,
                        isJBackActive: false,
                        shibariSuits: [],
                        discardPile: newDiscard,
                        pendingActions: newPendingActions,
                        turnPlayerId: nextTurnPlayerId
                     });
                });
            } catch (e) {
                showAlert(`自動流し処理エラー: ${e.message}`);
                await clearPendingActions();
            }
        }


        // --- Log and Cut-in ---
        function renderLog(log) {
            if (log.length === lastKnownLogCount) return;

            logMessagesDiv.innerHTML = '';
            log.forEach(entry => {
                const p = document.createElement('p');
                p.textContent = entry.message;
                logMessagesDiv.prepend(p);

                // Cut-in trigger
                if (log.indexOf(entry) >= lastKnownLogCount && entry.effect) {
                    showCutIn(entry.effect.card, entry.effect.name);
                }
            });
            lastKnownLogCount = log.length;
        }

        function showCutIn(cardName, effectName) {
            cutinOverlay.classList.remove('hidden');
            cutinCardName.textContent = cardName;
            cutinEffectName.textContent = effectName;
            cutinOverlay.offsetHeight; // Trigger reflow
            cutinOverlay.classList.add('visible');
            setTimeout(() => {
                cutinOverlay.classList.remove('visible');
                setTimeout(() => cutinOverlay.classList.add('hidden'), 500);
            }, 1500);
        }
        
showLogButton.addEventListener('click', () => logPanel.classList.add('visible'));
        logCloseButton.addEventListener('click', () => logPanel.classList.remove('visible'));

        // Initialize
        showScreen('login');

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
