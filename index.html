    <style>
        #error-display-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            max-height: 50vh;
            overflow-y: auto;
            background-color: rgba(255, 0, 0, 0.9);
            color: white;
            z-index: 10000;
            font-family: monospace;
            padding: 10px;
            box-sizing: border-box;
            display: none;
            white-space: pre-wrap;
        }

    <script>
        window.addEventListener('error', function(event) {
            var container = document.getElementById('error-display-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'error-display-container';
                document.body.appendChild(container);
            }
            container.style.display = 'block';
            container.innerHTML += '<p>Error: ' + event.message + ' at ' + event.filename + ':' + event.lineno + ':' + event.colno + '</p>';
        });
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason === 'Modal closed externally' || event.reason === 'New modal opened' || event.reason === 'User cancelled') {
                event.preventDefault();
                return;
            }
            var container = document.getElementById('error-display-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'error-display-container';
                document.body.appendChild(container);
            }

            container.style.display = 'block';
            container.innerHTML += '<p>Unhandled Promise Rejection: ' + event.reason + '</p>';
        });
    </script>

        function initThreeJS() {

            renderer.setSize(window.innerWidth, window.innerHeight);

            const arrowMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            turnIndicator = new THREE.Mesh(arrowGeo, arrowMat);
            turnIndicator.rotation.x = Math.PI;
            turnIndicator.visible = false;
            scene.add(turnIndicator);

            raycaster = new THREE.Raycaster();

            mouse = new THREE.Vector2();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();

            });

            window.addEventListener('pointermove', onPointerMove, { passive: false });
            window.addEventListener('pointerup', onPointerUp, { passive: false });
            window.addEventListener('click', onCanvasClick);
            window.addEventListener('touchstart', onCanvasClick, { passive: false });
            window.addEventListener('touchmove', function(event) {
                const gameScreen = document.getElementById('game-screen');
                const modalOverlay = document.getElementById('modal-overlay');
                const logPanel = document.getElementById('log-panel');
                if (gameScreen.classList.contains('active') && 
                    !modalOverlay.classList.contains('visible-modal') &&
                    !logPanel.classList.contains('visible')) {
                    event.preventDefault();
                }
            }, { passive: false });
            animateThreeJS();
        }


        function onPointerDown(event) {
            if (!passModeContext.active) return;
            event.preventDefault();
            const clientX = event.clientX;
            const clientY = event.clientY;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children);
for (let i = 0; i < intersects.length; i++) {
                const obj = intersects[i].object;
if (obj.userData && obj.userData.card) {
                    if (passModeContext.active && obj.userData.isMine) {
                        dragContext.active = true;
dragContext.mesh = obj;
                        dragContext.mode = 'pass';
                        dragContext.startPos.copy(obj.userData.originalPos || obj.position);
                        gsap.to(obj.position, { y: 6.0, duration: 0.1 });
                        break;
                    }
                }
            }
        }


        function onPointerMove(event) {
            if (!dragContext.active || !dragContext.mesh) return;
            event.preventDefault();
            const clientX = event.clientX;
            const clientY = event.clientY;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -6.0);
const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, intersectPoint);
            if (intersectPoint) {
                if (dragContext.mode === 'pass') {
                    let closestPlayer = null;
let minDist = 6.0;
                    Object.keys(playerNameSprites).forEach(pid => {
                        if (pid === currentPlayer.id) return;
                        const sprite = playerNameSprites[pid];
                        const dist = new THREE.Vector2(intersectPoint.x, intersectPoint.z).distanceTo(new THREE.Vector2(sprite.position.x, sprite.position.z));
        
                if (dist < minDist) {
                            minDist = dist;
                            closestPlayer = pid;
                    
    }
                    });
if (closestPlayer) {
                        const spritePos = playerNameSprites[closestPlayer].position;
dragContext.mesh.position.x = spritePos.x;
                        dragContext.mesh.position.y = spritePos.y + 1.0;
                        dragContext.mesh.position.z = spritePos.z;
                        dragContext.targetId = closestPlayer;
                    } else {
                        dragContext.mesh.position.x = intersectPoint.x;
                        dragContext.mesh.position.y = 6.0;
dragContext.mesh.position.z = intersectPoint.z;
                        dragContext.targetId = null;
                    }
                }
            }
        }



        function onPointerUp(event) {
            if (!dragContext.active || !dragContext.mesh) return;
dragContext.active = false;
            
            if (dragContext.mode === 'pass') {
                const oldTargetId = passModeContext.assignments.find(a => a.card.uid === dragContext.mesh.userData.card.uid)?.targetId;
                
                if (dragContext.targetId) {
                    const closestPlayer = dragContext.targetId;
const existingIdx = passModeContext.assignments.findIndex(a => a.card.uid === dragContext.mesh.userData.card.uid);
                    if (existingIdx > -1) passModeContext.assignments.splice(existingIdx, 1);
                    passModeContext.assignments.push({ targetId: closestPlayer, card: dragContext.mesh.userData.card });
                } else {
                    const existingIdx = passModeContext.assignments.findIndex(a => a.card.uid === dragContext.mesh.userData.card.uid);
if (existingIdx > -1) passModeContext.assignments.splice(existingIdx, 1);
                    gsap.to(dragContext.mesh.position, { x: dragContext.startPos.x, y: dragContext.startPos.y, z: dragContext.startPos.z, duration: 0.3 });
                    if (dragContext.mesh.userData.originalRot) {
                        gsap.to(dragContext.mesh.rotation, { x: dragContext.mesh.userData.originalRot.x, y: dragContext.mesh.userData.originalRot.y, z: dragContext.mesh.userData.originalRot.z, duration: 0.3 });
                    }
                }

                const playersToUpdate = new Set();
                if (dragContext.targetId) playersToUpdate.add(dragContext.targetId);
                if (oldTargetId) playersToUpdate.add(oldTargetId);
                
                playersToUpdate.forEach(pid => {
                    const cardsForPlayer = passModeContext.assignments.filter(a => a.targetId === pid);
                    const spritePos = playerNameSprites[pid].position;
                    const angle = Math.atan2(spritePos.x, spritePos.z);
                  
  cardsForPlayer.forEach((assignment, index) => {
                        const meshToMove = cardMeshes[assignment.card.uid];
                        const spread = 1.0;
                        const offset = (index - (cardsForPlayer.length - 1) / 2) * spread;
      
                  const targetX = spritePos.x + Math.cos(angle) * offset;
                        const targetZ = spritePos.z - Math.sin(angle) * offset;
                        gsap.to(meshToMove.position, { x: targetX, y: spritePos.y + 1.0, z: targetZ, duration: 0.3 });
          
              gsap.to(meshToMove.rotation, { x: Math.PI / 2, y: angle + Math.PI, z: 0, duration: 0.3 });
                    });
                });

                const confirmBtn = document.getElementById('custom-pass-confirm-btn');

                if (confirmBtn) {
                    confirmBtn.disabled = passModeContext.assignments.length !== passModeContext.requiredCount;
                }
            }
            dragContext.mesh = null;
        }



        function animateThreeJS() {
            requestAnimationFrame(animateThreeJS);
            if (turnIndicator && turnIndicator.visible) {
                const time = Date.now() * 0.005;
                turnIndicator.position.y = turnIndicator.userData.baseY + Math.sin(time) * 0.5;
            }
            renderer.render(scene, camera);
        }


        function generateCardTexture(card) {

            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#cccccc';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            if (card.suit === 'joker' && !card.mimics) {
                ctx.fillStyle = '#333333';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('JOKER', canvas.width / 2, canvas.height / 2);
            } else {
                const displayCard = card.mimics ? card.mimics : card;
                const suitSymbols = { spade: '♠', heart: '♥', diamond: '♦', club: '♣' };
                const color = (displayCard.suit === 'heart' || displayCard.suit === 'diamond') ? '#ff0000' : '#000000';
                ctx.fillStyle = color;
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(suitSymbols[displayCard.suit], canvas.width / 2, 60);
                ctx.font = 'bold 48px Arial';
                ctx.fillText(numberToString(displayCard.number), canvas.width / 2, 140);
                ctx.font = 'bold 36px Arial';
                ctx.fillText(suitSymbols[displayCard.suit], canvas.width / 2, 220);
                if (card.mimics) {
                    ctx.fillStyle = '#00796b';
                    ctx.font = '16px Arial';
                    ctx.fillText('JOKER', canvas.width / 2, 20);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        function getCardBackTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#002244';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
            return new THREE.CanvasTexture(canvas);
        }

        function createCardMesh3D(card) {
            const geometry = new THREE.BoxGeometry(1.5, 0.05, 2.5);
const frontTex = generateCardTexture(card);
            const backTex = getCardBackTexture();
            const sideMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
const materials = [
                sideMat,
                sideMat,
                new THREE.MeshStandardMaterial({ map: frontTex }),
                new THREE.MeshStandardMaterial({ map: backTex }),
                sideMat,
         
               sideMat
            ];
const mesh = new THREE.Mesh(geometry, materials);
            mesh.userData = { card: card, isSelected: false };
            return mesh;
}        function onCanvasClick(event) {
            if (document.getElementById('game-screen').classList.contains('active') === false) return;
            if (document.getElementById('modal-overlay').classList.contains('visible-modal')) return;
            if (passModeContext.active) return;
            if (spectatingPlayerId) return;
            let clientX = event.clientX;


            let clientY = event.clientY;

            if (event.changedTouches && event.changedTouches.length > 0) {
                clientX = event.changedTouches[0].clientX;
                clientY = event.changedTouches[0].clientY;
            } else if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
const intersects = raycaster.intersectObjects(scene.children);
for (let i = 0; i < intersects.length; i++) {
                const obj = intersects[i].object;
                
                if (stealMiniGameContext.active && stealMiniGameContext.targetMeshes.includes(obj)) {
                    gsap.to(obj.position, { y: obj.position.y + 1.5, z: obj.position.z + 1, duration: 0.3 });
                    stealMiniGameContext.pulledCount++;
                    const index = stealMiniGameContext.targetMeshes.indexOf(obj);
                    if (index > -1) stealMiniGameContext.targetMeshes.splice(index, 1);
                    if (stealMiniGameContext.pulledCount >= stealMiniGameContext.requiredCount) {
                        stealMiniGameContext.active = false;
                        setTimeout(() => {
                            proceedNextStealMiniGame();
                        }, 800);
                    }
                    break;
                }


                if (obj.userData && obj.userData.card) {
                    if (obj.userData.isMine) {
                        handleCardClick(obj.userData.card);
                    }
                    break;
                }
            }
        }


        function update3DScene(roomData, me) {
            if (passModeContext.active || stealMiniGameContext.active) return;
            const viewerId = spectatingPlayerId || me.id;
            const numPlayers = roomData.players.length;
            const myIndex = roomData.players.findIndex(p => p.id === me.id);
            const radius = 9;
            playerPositions = []
            for (let i = 0; i < numPlayers; i++) {
                const angle = (i / numPlayers) * Math.PI * 2;
                playerPositions.push({
                    x: -Math.sin(angle) * radius,
                    z: Math.cos(angle) * radius,
                    angle: -angle
                });
            }

            const viewerIndex = roomData.players.findIndex(p => p.id === viewerId);
            const viewerPosIndex = (viewerIndex - myIndex + numPlayers) % numPlayers;
            const viewerAngle = (viewerPosIndex / numPlayers) * Math.PI * 2;
            const targetCamX = -Math.sin(viewerAngle) * 20;
            const targetCamZ = Math.cos(viewerAngle) * 20;
            
            gsap.to(camera.position, {
                x: targetCamX,
                y: 15,
                z: targetCamZ,
                duration: 1.0,
                onUpdate: () => camera.lookAt(0, 0, 0)
            });

            
            const newCardMeshes = {};
            const uidsInScene = new Set();

            const activePlayerIds = new Set();
            const animationsToRun = [];
            roomData.players.forEach((player, i) => {
                activePlayerIds.add(player.id);
                const posIndex = (i - myIndex + numPlayers) % numPlayers;
                const pos = playerPositions[posIndex];
               
                if (player.id !== me.id) {
                    const isTurnPlayer = player.id === roomData.turnPlayerId;
                    if (!playerNameSprites[player.id] || playerNameSprites[player.id].userData.isTurnPlayer !== isTurnPlayer) {
                        if (playerNameSprites[player.id]) scene.remove(playerNameSprites[player.id]);
                        const canvas = document.createElement('canvas');
                        canvas.width = 512; canvas.height = 128;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = isTurnPlayer ? '#ffeb3b' : 'white';
                        ctx.font = 'bold 56px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText(player.name, 256, 80);
                        const tex = new THREE.CanvasTexture(canvas);
                        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
                        const sprite = new THREE.Sprite(mat);
                        sprite.scale.set(6, 1.5, 1);
                        sprite.raycast = function() {};
                        sprite.userData = { isTurnPlayer: isTurnPlayer };
                        scene.add(sprite);
                        playerNameSprites[player.id] = sprite;
                    }
                    playerNameSprites[player.id].position.set(pos.x, 5.5, pos.z);
                }




                if (player.hand) {
                    player.hand.forEach((card, j) => {
                        const uid = card.uid;
                        uidsInScene.add(uid);
        
                        let mesh = cardMeshes[uid];
                        let isNew = false;
                        if (!mesh) {
                            mesh = createCardMesh3D(card);
                            isNew = true;
                            scene.add(mesh);
                        }
          
                        mesh.visible = true;
                        newCardMeshes[uid] = mesh;

                        const isMine = player.id === viewerId;
                 
                        mesh.userData.isMine = isMine;

                        const spread = isMine ? 1.0 : 0.3;
                        const offset = (j - player.hand.length / 2) * spread;
               
                        mesh.rotation.order = 'YXZ';
                        const depthOffset = j * 0.01;
                        const targetX = pos.x + Math.cos(pos.angle) * offset - Math.sin(pos.angle) * depthOffset;
                        const targetZ = pos.z - Math.sin(pos.angle) * offset - Math.cos(pos.angle) * depthOffset;
                        let targetY = isMine ? 1.5 : 2.5;
                        let targetRotX = isMine ? Math.PI / 4 : Math.PI / 2;
                        let targetRotY = pos.angle;
                        let targetRotZ = 0;




if (isMine) {

                            mesh.userData.originalPos = new THREE.Vector3(targetX, targetY, targetZ);
                            mesh.userData.originalRot = new THREE.Vector3(targetRotX, targetRotY, targetRotZ);
                            const isSelected = selectedCards.some(sc => sc.uid === uid);
                            if (isSelected) {
                                targetY += 1.0;
                            }
                        }

                        animationsToRun.push({
                            mesh: mesh,
                            isNew: isNew,
                            targetX: targetX, targetY: targetY, targetZ: targetZ,
                            targetRotX: targetRotX, targetRotY: targetRotY, targetRotZ: targetRotZ
                        });
                    });
                }
            });

            const newHandCards = animationsToRun.filter(a => a.isNew);
            const isInitialDeal = newHandCards.length >= 10;

            if (isInitialDeal) {
                const totalNewCards = newHandCards.length;
                newHandCards.forEach((anim, idx) => {
                    anim.mesh.position.set(0, 0.26 + (totalNewCards - 1 - idx) * 0.01, 0);
                    anim.mesh.rotation.set(Math.PI, 0, 0);
                });
                newHandCards.forEach((anim, idx) => {
                    gsap.to(anim.mesh.position, { y: 4 + (totalNewCards - 1 - idx) * 0.01, duration: 1.0, ease: "power2.out" });
                });
                animationsToRun.forEach((anim, idx) => {

                    if (anim.isNew) {
                        gsap.to(anim.mesh.position, { 
                            x: anim.targetX, y: anim.targetY, z: anim.targetZ, 
                            duration: 0.6, delay: 1.2 + idx * 0.05, ease: "power2.out" 
                        });
                        gsap.to(anim.mesh.rotation, { 
                            x: anim.targetRotX, y: anim.targetRotY, z: anim.targetRotZ, 
                            duration: 0.6, delay: 1.2 + idx * 0.05, ease: "power2.out" 
                        });
                    } else {
                        gsap.to(anim.mesh.position, { x: anim.targetX, y: anim.targetY, z: anim.targetZ, duration: 0.5 });
                        gsap.to(anim.mesh.rotation, { x: anim.targetRotX, y: anim.targetRotY, z: anim.targetRotZ, duration: 0.5 });
                    }
                });
            } else {
                animationsToRun.forEach(anim => {
                    gsap.to(anim.mesh.position, { x: anim.targetX, y: anim.targetY, z: anim.targetZ, duration: 0.5 });
                    gsap.to(anim.mesh.rotation, { x: anim.targetRotX, y: anim.targetRotY, z: anim.targetRotZ, duration: 0.5 });
                });
            }
            roomData.field.forEach((card, j) => {

                const uid = card.uid;
                uidsInScene.add(uid);
                let mesh = cardMeshes[uid];
                if (!mesh) {
                    mesh = createCardMesh3D(card);
   
                    mesh.position.set(0, 5, 0);
                    scene.add(mesh);
                }
                mesh.visible = true;
                mesh.userData.isMine = false;
                newCardMeshes[uid] = mesh;
      
                const offset = (j - roomData.field.length / 2) * 1.0;

                gsap.to(mesh.position, { x: offset, y: 0.26, z: 0, duration: 0.5 });
                gsap.to(mesh.rotation, { x: 0, y: 0, z: 0, duration: 0.5 });
            });


            if (roomData.discardPile) {
                roomData.discardPile.forEach((card, j) => {
                    const uid = card.uid;
                    uidsInScene.add(uid);
                    let mesh = cardMeshes[uid];
             
                    if (!mesh) {
                        mesh = createCardMesh3D(card);
                        mesh.position.set(0, 5, 0);
                        scene.add(mesh);
  
                    }
                    mesh.visible = true;
                    mesh.userData.isMine = false;
                    newCardMeshes[uid] = mesh;
                    gsap.to(mesh.position, { x: -4, y: 0.26 + j * 0.05, z: 0, duration: 0.5 });
                    gsap.to(mesh.rotation, { x: Math.PI, y: 0, z: 0, duration: 0.5 });
                });
            }


            Object.keys(playerNameSprites).forEach(pid => {
                if (!activePlayerIds.has(pid)) {
                    scene.remove(playerNameSprites[pid]);
                    delete playerNameSprites[pid];
                }
            });

            Object.keys(cardMeshes).forEach(uid => {

                if (!uidsInScene.has(uid)) {
                    const meshToRemove = cardMeshes[uid];
                    gsap.delayedCall(0.5, () => {
                        scene.remove(meshToRemove);
        
                    });
                }
            });
            cardMeshes = newCardMeshes;

            if (turnIndicator) {
                const turnSprite = playerNameSprites[roomData.turnPlayerId];
                if (turnSprite && roomData.turnPlayerId !== currentPlayer.id) {
                    turnIndicator.visible = true;
                    turnIndicator.position.set(turnSprite.position.x, turnSprite.position.y + 2, turnSprite.position.z);
                    turnIndicator.userData.baseY = turnSprite.position.y + 2.5;
                } else {
                    turnIndicator.visible = false;
                }
            }
        }

        async function fetchPublicRooms() {
            publicRoomsListDiv.innerHTML = '<p>参加可能なルームを検索中...</p>';
            try {
                const roomsRef = collection(db, 'rooms');
                const q = query(roomsRef,
                    where('gameState', '==', 'waiting'),
                    orderBy('createdAt', 'desc'),
                    limit(20)
                );
                const querySnapshot = await getDocs(q);
                const rooms = [];
                querySnapshot.forEach((doc) => {
                    rooms.push(doc.data());
                });
                renderPublicRooms(rooms);
            } catch (error) {
                console.error("Error fetching public rooms: ", error);
                publicRoomsListDiv.innerHTML = `<p style="color:red; font-weight:bold;">インデックス作成が必要です。下のボックス内のURLを全てコピーしてください。</p><textarea style="width: 100%; height: 80px;">${error.message}</textarea>`;
            }
        }


        function renderPublicRooms(rooms) {
            publicRoomsListDiv.innerHTML = '';
            if (rooms.length === 0) {
                publicRoomsListDiv.innerHTML = '<p>現在参加可能なルームはありません。</p>';
                return;
            }

            const list = document.createElement('ul');
            list.style.listStyle = 'none';
            list.style.padding = '0';
            list.style.margin = '0';

            rooms.forEach(room => {
                // Ensure room has players and createdAt before trying to display
                if (!room.players || !room.createdAt) return;

                const host = room.players.find(p => p.isHost);
                const hostName = host ? host.name : '不明';
                const playerCount = room.players.length;
                const creationTime = new Date(room.createdAt.toDate()).toLocaleString('ja-JP');

                const item = document.createElement('li');
                item.style.display = 'flex';
                item.style.justifyContent = 'space-between';
                item.style.alignItems = 'center';
                item.style.padding = '8px';
                item.style.borderBottom = '1px solid #ddd';

                const infoDiv = document.createElement('div');
                infoDiv.innerHTML = `<strong>${hostName}のルーム</strong> (${playerCount}/6人)<br><small>作成日時: ${creationTime}</small>`;

                const joinBtn = document.createElement('button');
                joinBtn.textContent = '参加';
                joinBtn.onclick = async () => { // ★ asyncキーワードを追加
    try {
        // Prevent joining a full room, just in case
        if (room.players.length >= 6) {
            showAlert('このルームは満員です。');
            fetchPublicRooms(); // Refresh list
            return;
        }
         // Prevent joining with a duplicate name
        if (room.players.find(p => p.name === currentPlayer.name)) {
            showAlert('同じ名前のプレイヤーが既にルームにいます。');
            return;
        }
        
        const roomId = room.id;
        const roomRef = doc(db, 'rooms', roomId);
        
        // 念のため、最新のルーム情報を取得して最終チェック
        const roomSnap = await getDoc(roomRef);
        if (!roomSnap.exists()) {
             showAlert('指定されたルームが見つかりません。リストを更新します。');
             fetchPublicRooms();

        function getCardStrength(card) {
            if (card.suit === 'joker' && !card.mimics) return 99;
            const cardToEval = card.mimics ? card.mimics : card;
            let value = cardToEval.number === 1 ? 14 : (cardToEval.number === 2 ? 15 : cardToEval.number);
            return value;
        }
        
        function getCardValue(card, roomData) {
            // 単体のJokerは、どんな状況でも常に最強とする特別ルールを適用
            if (card.suit === 'joker' && !card.mimics) {
                return 99; // 革命やJバックの影響を受けずに常に最強の値を返す
            }
            
            const strengthReversed = roomData.isRevolution ^ roomData.isJBackActive;
            // XOR
            const baseStrength = getCardStrength(card);
            
            // Joker以外のカードは、革命やJバックの影響を受ける
            return strengthReversed ?
                16 - baseStrength : baseStrength;
        }
        
        function getNextPlayerId(players, currentId, direction, skipCount) {
            const activePlayers = players.filter(p => p.rank === null).sort((a,b) => a.order - b.order);
if (activePlayers.length === 0) return null;
            if (activePlayers.length === 1) return activePlayers[0].id;
            
            let currentIndex = activePlayers.findIndex(p => p.id === currentId);
if (currentIndex === -1) { 
                const originalPlayer = players.find(p => p.id === currentId);
                if (!originalPlayer) return activePlayers[0].id;

                let virtualIndex = activePlayers.findIndex(p => p.order > originalPlayer.order);
                if (virtualIndex === -1) virtualIndex = activePlayers.length;

                if (direction === 1) {
                    currentIndex = virtualIndex - 1;
                } else {
                    currentIndex = virtualIndex % activePlayers.length;
                }
            }
            
            const totalMoves = 1 + skipCount;
            let nextIndex = (currentIndex + (totalMoves * direction)) % activePlayers.length;
            if (nextIndex < 0) nextIndex += activePlayers.length;
            return activePlayers[nextIndex].id;
}

            return cards.map(c => {

        function isStair(cards) {
            if (cards.length < 3) return false;
            const cardsToEval = cards.map(c => c.mimics ? { ...c.mimics, uid: c.uid } : c);
            const realCards = cardsToEval.filter(c => c.suit !== 'joker');
            if (realCards.length === 0) return false;

            const suit = realCards[0].suit;
            if (!realCards.every(c => c.suit === suit)) return false;

            const strengths = realCards.map(c => getCardStrength(c)).sort((a,b) => a-b);
            
            // 重複チェック
            for (let i = 0; i < strengths.length - 1; i++) {
                if (strengths[i] === strengths[i+1]) return false;
            }

            let jokersAvailable = cards.length - realCards.length;
            
            for(let i = 0; i < strengths.length - 1; i++) {
                const diff = strengths[i+1] - strengths[i] - 1;
                if (diff < 0) {
                    // 通常ありえないが、ソートされているので重複と同じ
                    return false;
                }
                if (diff > 0) {
                    jokersAvailable -= diff;
                }
            }
            
            return jokersAvailable >= 0;
        }

            const isFieldStair = isStair(roomData.field);

            if (playCards.length !== roomData.field.length) return { valid: false, message: '場と同じ枚数のカードを出してください。' };
            
            let playValue, fieldValue;

        function proceedNextStealMiniGame() {
            if (stealMiniGameContext.currentTargetIndex >= stealMiniGameContext.targets.length) {
                gsap.to(camera.position, { x: stealMiniGameContext.originalCamPos.x, y: stealMiniGameContext.originalCamPos.y, z: stealMiniGameContext.originalCamPos.z, duration: 1, onUpdate: () => camera.lookAt(0,0,0) });
                stealMiniGameContext.finalActionCallback();
                return;
            }
            const currentObj = stealMiniGameContext.targets[stealMiniGameContext.currentTargetIndex];
            const targetSprite = playerNameSprites[currentObj.playerId];
            if (!targetSprite) {
                stealMiniGameContext.currentTargetIndex++;
                proceedNextStealMiniGame();
                return;
            }
            stealMiniGameContext.requiredCount = currentObj.count;
            stealMiniGameContext.pulledCount = 0;
            const targetPos = new THREE.Vector3(targetSprite.position.x, 0, targetSprite.position.z);
            const camTargetPos = targetPos.clone().multiplyScalar(0.4).setY(22);
            gsap.to(camera.position, { x: camTargetPos.x, y: camTargetPos.y, z: camTargetPos.z, duration: 1, onUpdate: () => camera.lookAt(targetPos), onComplete: () => {


                stealMiniGameContext.targetMeshes = [];

                Object.values(cardMeshes).forEach(mesh => {
                    const dist = new THREE.Vector2(mesh.position.x, mesh.position.z).distanceTo(new THREE.Vector2(targetPos.x, targetPos.z));
                    if (dist < 3) {
                        targetCards.push(mesh);
                    }
                });
                
                for (let i = targetCards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [targetCards[i], targetCards[j]] = [targetCards[j], targetCards[i]];
                }

                const angle = Math.atan2(targetPos.x, targetPos.z);
                const dx = Math.cos(angle);
                const dz = -Math.sin(angle);

                targetCards.forEach((mesh, index) => {
                    stealMiniGameContext.targetMeshes.push(mesh);
                    gsap.to(mesh.rotation, { x: Math.PI, duration: 0.5 });
                    const offset = (index - targetCards.length / 2) * 1.5;
                    gsap.to(mesh.position, { x: targetPos.x + dx * offset, z: targetPos.z + dz * offset, duration: 0.5 });
                });
                setTimeout(() => { stealMiniGameContext.active = true; }, 600);
            }});

            stealMiniGameContext.currentTargetIndex++;

        async function returnToWaitingRoom() {
            if (!currentRoomId) return;
            const roomRef = doc(db, 'rooms', currentRoomId);
            try {
                await runTransaction(db, async (transaction) => {

                    const roomSnap = await transaction.get(roomRef);
                    if (!roomSnap.exists()) return;

                    const roomData = roomSnap.data();
                    
                    if (roomData.gameState === 'waiting') return;

                    let playersReset = roomData.players.map(p => ({
                        ...p,
                        hand: [],
                        rank: null,
                        order: -1
                    }));

                    transaction.update(roomRef, {
                        gameState: 'waiting',

                        shibariSuits: [],

        // --- Game Logic Helpers ---

        function handlePlayerFinish(players, finishedPlayerId) {
            const finishedCount = players.filter(p => p.rank !== null).length;
            const newRank = finishedCount + 1;
            const logs = [];
            const updatedPlayers = players.map(p => {
                if (p.id === finishedPlayerId && p.rank === null) {
                    const message = `${p.name}が${newRank}位で上がりました！`;
                    logs.push({ timestamp: Date.now(), message: message });
                    showCutIn(p.name, `${newRank}位でゴール！`);
                    return { ...p, rank: newRank };
                }
                return p;
            });
            return { updatedPlayers, 上がりLog: logs };
        }

        
        function checkGameEnd(state) {
            const activePlayers = state.players.filter(p => p.rank === null);
            if (activePlayers.length <= 1 && (!state.pendingActions || state.pendingActions.length === 0)) {
                state.gameState = 'finished';
                if (activePlayers.length === 1) {
                    const lastPlayer = activePlayers[0];
                    const rankCount = state.players.filter(p => p.rank !== null).length;
                    state.players = state.players.map(p => p.id === lastPlayer.id ? {...p, rank: rankCount + 1} : p);
                }
            }
            return state;
        }


        // --- Action Execution Functions ---
                async function executeAction(actionFn, logMessageFn, logContext) {
            const roomRef = doc(db, 'rooms', currentRoomId);
            try {
                await runTransaction(db, async (transaction) => {
                    const roomSnap = await transaction.get(roomRef);
                    if (!roomSnap.exists()) throw new Error("Room not found");
                    let roomData = roomSnap.data();
                    const me = roomData.players.find(p => p.id === currentPlayer.id);
                    
                    let { players, discardPile, logContext: actionLogContext } = await actionFn(roomData, me);
                    const finalLogContext = logContext || actionLogContext || {};
                    const logMessage = logMessageFn(finalLogContext);
    
                    let logEntry = {timestamp: Date.now(), message: logMessage};
                    if (finalLogContext.effect) {
                        logEntry.effect = finalLogContext.effect;
                    }
                    let logEntries = [logEntry];
                    
                    let tempPlayers = players;

                    // アクションの結果、手札が0枚になった全プレイヤーをチェックする
                    const originalPlayers = roomData.players;
tempPlayers.forEach(p => {
                        if (p.hand.length === 0 && p.rank === null) {
                            const 
{ updatedPlayers, 上がりLog } = handlePlayerFinish(tempPlayers, p.id);
                            tempPlayers = updatedPlayers;
                            logEntries.push(...上がりLog);
                        }
            
                    });

                    players = tempPlayers;
                    
                    const newPendingActions = roomData.pendingActions ? roomData.pendingActions.slice(1) : [];
                    
                    let nextState = {
                        players: players,
                        discardPile: discardPile || roomData.discardPile,
                        pendingActions: newPendingActions,
                        turnPlayerId: roomData.turnPlayerId
                    };
                    
                    if (newPendingActions.length === 0) {
                        nextState.turnPlayerId = getNextPlayerId(players, me.id, roomData.turnDirection, 0);
                    }
                    
                    const finalState = checkGameEnd(nextState);
                    transaction.update(doc(db, 'rooms', currentRoomId), {...finalState, log: arrayUnion(...logEntries)});
                });
            } catch (e) {
                showAlert(`エラー: ${e.message}`);
                await clearPendingActions();
            }
        }
        
        function executeGiveCards(targetId, cardsToGive) {
            executeAction(
                (roomData, me) => {
                    const giveUids = new Set(cardsToGive.map(c => c.uid));
                    const newMyHand = me.hand.filter(c => !giveUids.has(c.uid));
                    const targetPlayer = roomData.players.find(p => p.id === targetId);
                    const players = roomData.players.map(p => {
                        if (p.id === me.id) return { ...p, hand: newMyHand };
                        if (p.id === targetId) {
                                                        return {
                                ...p,
                                hand: [...p.hand, ...cardsToGive].sort((a,b) => getCardStrength(a) - getCardStrength(b)),
                                privateEvent: { id: Date.now(), type: 'receive_cards', actor: me.name, cards: cardsToGive }
                            };
                        }
                        return p;
                    });
                    return { players, logContext: { target: targetPlayer.name, cards: cardsToGive } };
                },

                (ctx) => `${currentPlayer.name}が${ctx.target}にカードを${ctx.cards.length}枚渡しました。`
            );
        }
        
        function executeDiscardCards(cardsToDiscard) {
             executeAction(
                (roomData, me) => {
                    const discardUids = new Set(cardsToDiscard.map(c => c.uid));
                    const newMyHand = me.hand.filter(c => !discardUids.has(c.uid));
                    const players = roomData.players.map(p => p.id === me.id ? { ...p, hand: newMyHand } : p);
                    return { players, discardPile: [...roomData.discardPile, ...cardsToDiscard.map(c => cleanCard(c))], logContext: { cards: cardsToDiscard } };
                },
                (ctx) => `${currentPlayer.name}がカード(${cardsToString(ctx.cards)})を捨てました。`
            );
        }
        
        function executeBomber(ranks) {
            executeAction(
                (roomData, me) => {
                    const rankSet = new Set(ranks);
                    let allDiscarded = [];
                    let finishedPlayerIds = [];

                    const players = roomData.players.map(p => {
                        if (p.rank !== null) return p;
                        const discarded = p.hand.filter(c => rankSet.has(c.number) || (rankSet.has(15) && c.suit === 'joker'));
                        const newHand = p.hand.filter(c => !discarded.find(dc => dc.uid === c.uid));
                        if(discarded.length > 0) allDiscarded.push(...discarded);
                        if(newHand.length === 0 && p.hand.length > 0) finishedPlayerIds.push(p.id);
                        return { ...p, hand: newHand };
                    });

                    return { players, discardPile: [...roomData.discardPile, ...allDiscarded.map(c => cleanCard(c))], logContext: { ranks } };

                },
                                (ctx) => `${currentPlayer.name}が数字[${ctx.ranks.map(numberToString).join(',')}]を破壊しました。`,
                {
                    ranks,
                    effect: {
                        card: `数字[${ranks.map(numberToString).join(',')}]`,
                        name: 'Qボンバー'

        function executeStealCard(targetId, count) {
            executeAction(
                (roomData, me) => {
                    let target = roomData.players.find(p => p.id === targetId);
                    if (!target || target.hand.length === 0) throw new Error("対象にカードがありません。");
                    let targetHand = [...target.hand];
                    let stolenCards = [];
                    for(let i=0; i<count && targetHand.length > 0; i++) {
                        stolenCards.push(targetHand.splice(Math.floor(Math.random() * targetHand.length), 1)[0]);
                    }
                    const newMyHand = [...me.hand, ...stolenCards].sort((a,b) => getCardStrength(a)-getCardStrength(b));
                    const players = roomData.players.map(p => {
                                if (p.id === me.id) return { ...p, hand: newMyHand, privateEvent: { id: Date.now(), type: 'steal_success', target: target.name, cards: stolenCards } };
                        if (p.id === targetId) return { ...p, hand: targetHand, privateEvent: { id: Date.now() + 1, type: 'stolen', actor: me.name, cards: stolenCards } };
return p;
                    });
                    return { players, logContext: { target: target.name, count: count } };

                },
                (ctx) => `${currentPlayer.name}が${ctx.target}からカードを${ctx.count}枚奪いました。`
);

        }
                function executeDistributedSteal(distribution) {
            executeAction(
                (roomData, me) => {
                    let players = [...roomData.players];
                    let logDetails = [];
                    let allStolenCardsForMe = [];

                    distribution.forEach(({playerId, count}) => {
                        if (count <= 0) return;
                        
                        let target = players.find(p => p.id === playerId);
                        if (!target || target.hand.length < count) {
                            throw new Error(`${target.name}から指定された枚数を奪えません。`);
                        }
                        
                        let targetHand = [...target.hand];
                        let stolenCards = [];
                        for(let i=0; i < count && targetHand.length > 0; i++) {
                            stolenCards.push(targetHand.splice(Math.floor(Math.random() * targetHand.length), 1)[0]);
                        }
                        
                        allStolenCardsForMe.push(...stolenCards);
                        logDetails.push({ name: target.name, count });

                        const targetIndex = players.findIndex(p => p.id === playerId);
                        players[targetIndex] = {
                            ...players[targetIndex],
                            hand: targetHand,
                            privateEvent: { id: Date.now() + Math.random(), type: 'stolen', actor: me.name, cards: stolenCards }
                        };
                    });

                    const myIndex = players.findIndex(p => p.id === me.id);
                    const newMyHand = [...me.hand, ...allStolenCardsForMe].sort((a,b) => getCardStrength(a)-getCardStrength(b));
                    players[myIndex] = {
                        ...players[myIndex],
                        hand: newMyHand,
                        privateEvent: { id: Date.now(), type: 'steal_success', target: '複数人', cards: allStolenCardsForMe }
                    };

                    return { players, logContext: { logDetails } };
                },
                (ctx) => {
                    const stealSummary = ctx.logDetails.map(d => `${d.name}から${d.count}枚`).join(', ');
                    return `${currentPlayer.name}が${stealSummary}奪いました。`;
                }
            );
        }

                remainingDiv.style.fontWeight = 'bold';

                const updateTotal = () => {
                    const totalAssigned = Object.values(assignments).reduce((sum, val) => sum + val, 0);
                    remainingDiv.textContent = `残り: ${maxPossibleSteal - totalAssigned}`;
                    modalConfirmButton.disabled = totalAssigned !== maxPossibleSteal;
                };

                targetablePlayers.forEach(p => {

                    const countSpan = document.createElement('span');

                    countSpan.style.margin = '0 10px';
                    countSpan.style.display = 'inline-block';
                    countSpan.style.width = '20px';
                    
                    const plusBtn = document.createElement('button');
                    plusBtn.textContent = '+';
                    plusBtn.style.width = '30px';

                    minusBtn.onclick = () => {
                        if (assignments[p.id] > 0) {
                            assignments[p.id]--;
                            countSpan.textContent = assignments[p.id];
                            updateTotal();
                        }
                    };
                    plusBtn.onclick = () => {
                        const totalAssigned = Object.values(assignments).reduce((sum, val) => sum + val, 0);
                        if (totalAssigned < maxPossibleSteal && assignments[p.id] < p.hand.length) {
                            assignments[p.id]++;
                            countSpan.textContent = assignments[p.id];
                            updateTotal();
                        }
                    };

                    controlsDiv.appendChild(minusBtn);
                    controlsDiv.appendChild(countSpan);
                    controlsDiv.appendChild(plusBtn);
                    playerDiv.appendChild(nameLabel);
                    playerDiv.appendChild(controlsDiv);
                    container.appendChild(playerDiv);
                });

                showModal(title, container, { showConfirm: true, showCancel: false })
                    .then(() => {
                        closeModal();
                        const distribution = Object.entries(assignments)
                            .map(([playerId, count]) => ({ playerId, count }))
   
                         .filter(item => item.count > 0);
                        resolve(distribution);
                    })
                    .catch(reject);

                
                updateTotal();
            });
        }

        // --- Log and Cut-in ---
        function renderLog(log) {
            if (log.length === lastKnownLogCount) return;

            logMessagesDiv.innerHTML = '';
            log.forEach(entry => {
                const p = document.createElement('p');
                p.textContent = entry.message;
                logMessagesDiv.prepend(p);

                // Cut-in trigger
                if (log.indexOf(entry) >= lastKnownLogCount && entry.effect) {
                    showCutIn(entry.effect.card, entry.effect.name);
                }
            });
            lastKnownLogCount = log.length;
        }

        function showCutIn(cardName, effectName) {
            cutinOverlay.classList.remove('hidden');
            cutinCardName.textContent = cardName;
            cutinEffectName.textContent = effectName;
            cutinOverlay.offsetHeight; // Trigger reflow
            cutinOverlay.classList.add('visible');
            setTimeout(() => {
                cutinOverlay.classList.remove('visible');
                setTimeout(() => cutinOverlay.classList.add('hidden'), 500);
            }, 1500);
        }
        
showLogButton.addEventListener('click', () => logPanel.classList.add('visible'));
        logCloseButton.addEventListener('click', () => logPanel.classList.remove('visible'));

        // Initialize
        showScreen('login');

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
